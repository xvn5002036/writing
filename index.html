<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>疏文管理中心 Pro</title>
    <!-- 載入 React 與 Babel (加入 crossorigin 確保跨域存取穩定) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 Lucide 圖標 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 載入傳統中文字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Noto Serif TC', serif; 
            -webkit-font-smoothing: antialiased; 
            background-color: #f0f2f5;
        }
        
        /* 列印模式專屬設定 - 隱藏所有介面，精確輸出 A4 */
        @media print {
            @page { size: A4; margin: 0; }
            body { background: white !important; }
            .print-hidden { display: none !important; }
            .print-area { 
                position: absolute !important; 
                top: 0 !important; left: 0 !important;
                width: 210mm !important; height: 297mm !important;
                transform: none !important; margin: 0 !important; 
                box-shadow: none !important; padding: 15mm !important;
                background-color: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
        
        /* 美化捲軸 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        
        /* 中文直書排版核心 */
        .writing-v { 
            writing-mode: vertical-rl; 
            text-orientation: upright; 
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 【修復白屏關鍵】重新封裝安全無衝突的 Icon 組件
        const Icon = ({ name, className }) => {
            const spanRef = useRef(null);
            
            useEffect(() => {
                if (window.lucide && spanRef.current) {
                    // 使用 span 包裹隔離 React 與 Lucide 的 DOM 操作
                    spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className || ''}"></i>`;
                    window.lucide.createIcons({ root: spanRef.current });
                }
            }, [name, className]);

            return <span ref={spanRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}></span>;
        };

        // 模版資料庫 (加入邊框與文字顏色設定)
        const MASTER_TEMPLATES = [
            { id: 97, name: '四聯祈福小牌位', size: '190x280mm', color: '#8B0000', bgColor: '#fff5f5' },
            { id: 82, name: '往生蓮位', size: '125x364mm', color: '#b45309', bgColor: '#fffef0' },
            { id: 98, name: '往生牒殼', size: '128x390mm', color: '#b45309', bgColor: '#fffef0' },
            { id: 102, name: '水陸往生牒心', size: '297x420mm', color: '#334155', bgColor: '#ffffff' },
            { id: 99, name: '延生牒殼', size: '125x390mm', color: '#8B0000', bgColor: '#fff5f5' },
            { id: 110, name: '化解太歲祈福文疏', size: '210x297mm', color: '#8B0000', bgColor: '#ffffff' },
        ];

        const App = () => {
            const [view, setView] = useState('grid');
            const [records, setRecords] = useState([]);
            const [activeTemplate, setActiveTemplate] = useState(MASTER_TEMPLATES[5]);
            
            // 手機端專用狀態
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [editorTab, setEditorTab] = useState('form'); 

            // 表單資料狀態
            const [formData, setFormData] = useState({
                id: '', name: '', address: '', 
                lunarDate: '甲辰年', lunarMonth: '正月', lunarDay: '初一',
                zodiac: '龍', wish: '消災解厄，吉祥如意', offerer: '信士張某某'
            });

            // 初始化與讀取 LocalStorage (加入 Try-Catch 確保不崩潰)
            useEffect(() => {
                try {
                    const saved = localStorage.getItem('ritual_pro_github_v3');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if(Array.isArray(parsed)) setRecords(parsed);
                    }
                } catch (e) {
                    console.error('歷史紀錄讀取失敗', e);
                }
            }, []);

            // 建立新疏文
            const handleCreate = (template) => {
                setActiveTemplate(template);
                setFormData({ ...formData, id: Date.now(), name: '', address: '' });
                setView('editor');
                setEditorTab('form');
                setIsSidebarOpen(false);
            };

            // 儲存紀錄
            const handleSave = () => {
                if (!formData.name) {
                    alert('請至少輸入對象姓名！');
                    return;
                }
                const newRecords = [formData, ...records.filter(r => r.id !== formData.id)];
                setRecords(newRecords);
                localStorage.setItem('ritual_pro_github_v3', JSON.stringify(newRecords));
                setView('list');
            };

            // 刪除紀錄
            const deleteRecord = (id) => {
                if (confirm('確定要刪除這筆紀錄嗎？')) {
                    const updated = records.filter(r => r.id !== id);
                    setRecords(updated);
                    localStorage.setItem('ritual_pro_github_v3', JSON.stringify(updated));
                }
            };

            const printDoc = () => window.print();

            // 側邊導航項目組件
            const NavItem = ({ icon, label, target }) => (
                <button 
                    onClick={() => { setView(target); setIsSidebarOpen(false); }}
                    className={`w-full flex items-center px-4 py-3 rounded-lg transition-all mb-1 ${view === target ? 'text-white bg-blue-600 shadow-md shadow-blue-600/30 font-bold' : 'text-gray-400 hover:bg-white/5 hover:text-gray-200'}`}
                >
                    <Icon name={icon} className="w-5 h-5" />
                    <span className="ml-4 text-sm">{label}</span>
                </button>
            );

            return (
                <div className="min-h-screen flex text-gray-800 relative w-full overflow-hidden">
                    
                    {/* --- 左側：專業深色側邊欄 (桌面版) --- */}
                    <aside className="hidden lg:flex w-[260px] bg-[#001529] flex-col shrink-0 print-hidden z-20 shadow-xl">
                        <div className="h-16 flex items-center px-6 bg-[#002140] border-b border-gray-800 shrink-0">
                            <div className="w-8 h-8 bg-gradient-to-br from-blue-500 to-blue-600 rounded flex items-center justify-center text-white font-black shadow-lg shadow-blue-500/50">禪</div>
                            <span className="ml-3 text-white font-bold tracking-widest text-sm">疏文管理中心 Pro</span>
                        </div>
                        <nav className="flex-1 py-6 px-3 overflow-y-auto">
                            <div className="text-[10px] font-bold text-gray-500 uppercase tracking-widest px-4 mb-2">系統模組</div>
                            <NavItem icon="layout-grid" label="模版中心" target="grid" />
                            <NavItem icon="list" label="歷史紀錄" target="list" />
                            
                            <div className="my-6 border-t border-gray-700/50 mx-4"></div>
                            
                            <div className="text-[10px] font-bold text-gray-500 uppercase tracking-widest px-4 mb-2">管理設定</div>
                            <button className="w-full flex items-center px-4 py-3 rounded-lg text-gray-400 hover:bg-white/5 hover:text-gray-200 transition-all mb-1">
                                <Icon name="user" className="w-5 h-5" /> <span className="ml-4 text-sm">帳號設定</span>
                            </button>
                            <button className="w-full flex items-center px-4 py-3 rounded-lg text-gray-400 hover:bg-white/5 hover:text-gray-200 transition-all">
                                <Icon name="settings" className="w-5 h-5" /> <span className="ml-4 text-sm">系統參數</span>
                            </button>
                        </nav>
                        <div className="p-5 bg-[#000c17] shrink-0">
                            <div className="bg-white/5 rounded-lg p-3">
                                <p className="text-[10px] text-gray-400 mb-1 uppercase tracking-wider">GitHub Pages Edition</p>
                                <p className="text-white text-xs font-mono font-bold">Version 3.1 Pro (Stable)</p>
                            </div>
                        </div>
                    </aside>

                    {/* --- 手機側邊欄抽屜 (Mobile Drawer) --- */}
                    <div className={`lg:hidden fixed inset-0 z-[100] transition-opacity duration-300 ${isSidebarOpen ? 'opacity-100' : 'opacity-0 pointer-events-none print-hidden'}`}>
                        <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setIsSidebarOpen(false)}></div>
                        <div className={`absolute left-0 top-0 bottom-0 w-72 bg-[#001529] shadow-2xl transition-transform duration-300 flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                            <div className="h-16 flex items-center px-6 bg-[#002140] border-b border-gray-800 shrink-0 justify-between">
                                <div className="flex items-center">
                                    <div className="w-8 h-8 bg-blue-500 rounded flex items-center justify-center text-white font-bold">禪</div>
                                    <span className="ml-3 text-white font-bold">疏文中心 Pro</span>
                                </div>
                                <button className="text-gray-400 hover:text-white" onClick={() => setIsSidebarOpen(false)}><Icon name="x" className="w-6 h-6"/></button>
                            </div>
                            <nav className="flex-1 py-4 px-3 overflow-y-auto">
                                <NavItem icon="layout-grid" label="模版中心" target="grid" />
                                <NavItem icon="list" label="歷史紀錄" target="list" />
                            </nav>
                        </div>
                    </div>

                    {/* --- 主內容區 --- */}
                    <div className="flex-1 flex flex-col h-screen overflow-hidden w-full relative">
                        
                        {/* 頂部導覽列 (Header) */}
                        <header className="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 md:px-8 shrink-0 print-hidden z-10">
                            <div className="flex items-center gap-4">
                                <button className="lg:hidden p-2 -ml-2 hover:bg-gray-100 rounded-lg text-gray-600" onClick={() => setIsSidebarOpen(true)}>
                                    <Icon name="menu" className="w-6 h-6"/>
                                </button>
                                <div className="hidden md:flex items-center text-sm font-medium text-gray-500">
                                    <Icon name="home" className="w-4 h-4 mr-2" />
                                    系統主頁 <Icon name="chevron-right" className="w-4 h-4 mx-1" /> 
                                    <span className="text-gray-800">{view === 'grid' ? '模版列表' : view === 'list' ? '歷史紀錄' : '內容編輯器'}</span>
                                </div>
                                <div className="md:hidden font-bold text-gray-800 text-lg">
                                    {view === 'grid' ? '模版中心' : view === 'list' ? '歷史紀錄' : '內容編輯'}
                                </div>
                            </div>

                            <div className="flex items-center gap-4 lg:gap-6">
                                {/* 搜尋框 (僅桌面顯示) */}
                                <div className="relative hidden lg:block">
                                    <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" />
                                    <input type="text" placeholder="搜尋姓名、電話..." className="pl-10 pr-4 py-2 border border-gray-200 rounded-full text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-100 outline-none w-64 transition-all" />
                                </div>
                                {/* 管理員狀態 */}
                                <div className="flex items-center gap-3 lg:border-l lg:border-gray-200 lg:pl-6">
                                    <div className="hidden sm:block text-right">
                                        <p className="text-sm font-bold text-gray-700 leading-tight">管理員帳號</p>
                                        <p className="text-[10px] text-emerald-500 font-bold uppercase tracking-widest flex items-center justify-end gap-1">
                                            <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 inline-block animate-pulse"></span> ONLINE
                                        </p>
                                    </div>
                                    <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center text-white font-bold shadow-md cursor-pointer border-2 border-white ring-2 ring-gray-100">
                                        A
                                    </div>
                                </div>
                            </div>
                        </header>

                        {/* 動態內容視圖 */}
                        <main className="flex-1 overflow-y-auto w-full relative">
                            
                            {/* --- 視圖 1: 模版中心 (Grid) --- */}
                            {view === 'grid' && (
                                <div className="p-4 md:p-8 max-w-7xl mx-auto">
                                    <div className="mb-6 hidden md:block">
                                        <h2 className="text-2xl font-bold text-gray-800">選用打印模版</h2>
                                        <p className="text-sm text-gray-500 mt-1">請選擇下方適用的疏文或牌位樣式進行內容編輯。</p>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
                                        {MASTER_TEMPLATES.map(t => (
                                            <div key={t.id} className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-xl hover:border-blue-300 transition-all active:scale-[0.98] group cursor-pointer flex flex-col" onClick={() => handleCreate(t)}>
                                                <div className="h-40 sm:h-48 flex items-center justify-center relative p-4" style={{ backgroundColor: t.bgColor }}>
                                                    {/* 模擬紙張圖示 */}
                                                    <div className="border-2 border-dashed w-16 h-28 sm:w-20 sm:h-36 flex flex-col items-center justify-center transition-colors bg-white/50 shadow-sm" style={{ borderColor: t.color }}>
                                                        <Icon name="file-text" className="w-6 h-6 sm:w-8 sm:h-8 mb-2 opacity-50" style={{ color: t.color }} />
                                                        <span className="text-[8px] font-mono opacity-50 uppercase" style={{ color: t.color }}>Preview</span>
                                                    </div>
                                                    <div className="absolute top-3 right-3 bg-white/80 backdrop-blur px-2 py-1 rounded text-[10px] text-gray-600 font-mono shadow-sm">ID: {t.id}</div>
                                                </div>
                                                <div className="p-4 sm:p-5 border-t border-gray-100 flex-1 flex flex-col justify-between">
                                                    <div>
                                                        <h3 className="font-bold text-gray-800 text-base sm:text-lg mb-1 truncate">{t.name}</h3>
                                                        <p className="text-xs text-gray-500 mb-4">{t.size} | 直式排版</p>
                                                    </div>
                                                    <button className="w-full bg-slate-800 text-white text-sm font-bold py-2.5 rounded-xl group-hover:bg-blue-600 transition-colors flex justify-center items-center gap-2">
                                                        <Icon name="plus" className="w-4 h-4" /> 編輯此模版
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* --- 視圖 2: 歷史紀錄 (List) --- */}
                            {view === 'list' && (
                                <div className="p-4 md:p-8 max-w-7xl mx-auto">
                                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden flex flex-col">
                                        <div className="p-4 md:p-5 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                                            <h2 className="font-bold text-gray-800 flex items-center gap-2">
                                                <Icon name="database" className="w-5 h-5 text-blue-600" /> 本地歷史存檔
                                            </h2>
                                            <span className="text-xs font-bold bg-blue-100 text-blue-700 px-3 py-1 rounded-full">共 {records.length} 筆資料</span>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left min-w-[600px]">
                                                <thead className="bg-white border-b border-gray-200 text-xs font-black text-gray-400 uppercase tracking-wider">
                                                    <tr>
                                                        <th className="px-6 py-4 w-24">紀錄編號</th>
                                                        <th className="px-6 py-4">對象資料</th>
                                                        <th className="px-6 py-4">農曆時辰</th>
                                                        <th className="px-6 py-4 text-center">狀態</th>
                                                        <th className="px-6 py-4 text-right">系統操作</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100">
                                                    {records.map(r => (
                                                        <tr key={r.id} className="hover:bg-blue-50/50 transition-colors group">
                                                            <td className="px-6 py-4 text-xs font-mono text-gray-400">#{r.id.toString().slice(-6)}</td>
                                                            <td className="px-6 py-4">
                                                                <div className="font-bold text-gray-800 text-sm">{r.name}</div>
                                                                <div className="text-[11px] text-gray-500 mt-0.5">生肖屬 {r.zodiac} | 供養：{r.offerer}</div>
                                                            </td>
                                                            <td className="px-6 py-4 text-sm text-gray-600">
                                                                {r.lunarDate} {r.lunarMonth} {r.lunarDay}
                                                            </td>
                                                            <td className="px-6 py-4 text-center">
                                                                <span className="px-3 py-1 bg-emerald-100 text-emerald-700 text-[10px] font-bold rounded-full border border-emerald-200">
                                                                    已存檔
                                                                </span>
                                                            </td>
                                                            <td className="px-6 py-4 text-right">
                                                                <div className="flex justify-end gap-2 opacity-100 lg:opacity-0 lg:group-hover:opacity-100 transition-opacity">
                                                                    <button onClick={() => { setFormData(r); setView('editor'); setEditorTab('form'); }} className="p-2 text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors" title="編輯紀錄">
                                                                        <Icon name="edit-3" className="w-4 h-4"/>
                                                                    </button>
                                                                    <button onClick={() => deleteRecord(r.id)} className="p-2 text-red-500 bg-red-50 hover:bg-red-100 rounded-lg transition-colors" title="刪除紀錄">
                                                                        <Icon name="trash-2" className="w-4 h-4"/>
                                                                    </button>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                    {records.length === 0 && (
                                                        <tr>
                                                            <td colSpan="5" className="px-6 py-20 text-center">
                                                                <div className="flex flex-col items-center justify-center text-gray-400">
                                                                    <Icon name="inbox" className="w-12 h-12 mb-3 text-gray-300" />
                                                                    <p className="text-sm font-medium">目前尚無任何列印紀錄</p>
                                                                    <p className="text-xs mt-1">在模版中心編輯後儲存即可在此顯示</p>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* --- 視圖 3: 旗艦內容編輯器 --- */}
                            {view === 'editor' && (
                                <div className="flex flex-col lg:flex-row h-full overflow-hidden w-full absolute inset-0">
                                    
                                    {/* 手機版：頂部表單/預覽切換分頁 */}
                                    <div className="lg:hidden flex border-b bg-white print-hidden shrink-0 shadow-sm z-10">
                                        <button 
                                            className={`flex-1 py-3.5 text-sm font-bold border-b-2 transition-colors flex justify-center items-center gap-2 ${editorTab === 'form' ? 'text-blue-600 border-blue-600' : 'text-gray-500 border-transparent bg-gray-50'}`} 
                                            onClick={() => setEditorTab('form')}
                                        >
                                            <Icon name="edit-3" className="w-4 h-4" /> 編輯參數
                                        </button>
                                        <button 
                                            className={`flex-1 py-3.5 text-sm font-bold border-b-2 transition-colors flex justify-center items-center gap-2 ${editorTab === 'preview' ? 'text-blue-600 border-blue-600' : 'text-gray-500 border-transparent bg-gray-50'}`} 
                                            onClick={() => setEditorTab('preview')}
                                        >
                                            <Icon name="eye" className="w-4 h-4" /> 效果預覽
                                        </button>
                                    </div>

                                    {/* --- 編輯區：左側面板 --- */}
                                    <div className={`w-full lg:w-[420px] xl:w-[460px] bg-white border-r border-gray-200 flex flex-col shrink-0 print-hidden h-full ${editorTab === 'form' ? 'flex' : 'hidden lg:flex'}`}>
                                        {/* 操作列 */}
                                        <div className="p-4 border-b bg-gray-50 flex justify-between items-center shrink-0">
                                            <button onClick={() => setView('grid')} className="text-sm text-gray-500 hover:text-blue-600 flex items-center font-medium bg-white px-3 py-1.5 rounded-lg border shadow-sm">
                                                <Icon name="chevron-left" className="w-4 h-4 mr-1"/> 返回模版
                                            </button>
                                            <div className="flex gap-2">
                                                <button onClick={handleSave} className="px-3 py-1.5 bg-emerald-50 text-emerald-600 border border-emerald-200 hover:bg-emerald-500 hover:text-white rounded-lg transition-colors flex items-center font-bold text-sm shadow-sm" title="儲存紀錄">
                                                    <Icon name="save" className="w-4 h-4 mr-1.5"/> 儲存
                                                </button>
                                                <button onClick={printDoc} className="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors shadow-md shadow-blue-600/20 flex items-center font-bold text-sm" title="列印">
                                                    <Icon name="printer" className="w-4 h-4 mr-1.5"/> 列印
                                                </button>
                                            </div>
                                        </div>
                                        
                                        {/* 滾動表單區 */}
                                        <div className="flex-1 overflow-y-auto p-5 sm:p-6 space-y-8 bg-white pb-24 lg:pb-6">
                                            
                                            <section className="space-y-4">
                                                <h4 className="text-xs font-black text-gray-400 uppercase tracking-widest border-b pb-2 flex items-center gap-2">
                                                    <Icon name="user-check" className="w-4 h-4" /> 核心資料
                                                </h4>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="block text-[11px] font-bold text-gray-600 mb-1.5">對象姓名</label>
                                                        <input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white focus:border-blue-500 outline-none transition-all text-sm font-medium" placeholder="請輸入姓名" />
                                                    </div>
                                                    <div>
                                                        <label className="block text-[11px] font-bold text-gray-600 mb-1.5">生肖</label>
                                                        <select value={formData.zodiac} onChange={e => setFormData({...formData, zodiac: e.target.value})} className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-medium cursor-pointer">
                                                            {['鼠','牛','虎','兔','龍','蛇','馬','羊','猴','雞','狗','豬'].map(z => <option key={z} value={z}>{z}</option>)}
                                                        </select>
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="block text-[11px] font-bold text-gray-600 mb-1.5">農曆出生 / 往生日期</label>
                                                    <div className="flex gap-2">
                                                        <input type="text" value={formData.lunarDate} onChange={e => setFormData({...formData, lunarDate: e.target.value})} className="w-1/3 p-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium text-center focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all" placeholder="年 (如:甲辰年)" />
                                                        <input type="text" value={formData.lunarMonth} onChange={e => setFormData({...formData, lunarMonth: e.target.value})} className="w-1/3 p-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium text-center focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all" placeholder="月" />
                                                        <input type="text" value={formData.lunarDay} onChange={e => setFormData({...formData, lunarDay: e.target.value})} className="w-1/3 p-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium text-center focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all" placeholder="日" />
                                                    </div>
                                                </div>
                                            </section>

                                            <section className="space-y-4">
                                                <h4 className="text-xs font-black text-gray-400 uppercase tracking-widest border-b pb-2 flex items-center gap-2">
                                                    <Icon name="map-pin" className="w-4 h-4" /> 地址與祈願
                                                </h4>
                                                <div>
                                                    <label className="block text-[11px] font-bold text-gray-600 mb-1.5">詳細地址</label>
                                                    <textarea value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} rows="3" className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all resize-none font-medium leading-relaxed" placeholder="台灣省南投縣埔里鎮..." />
                                                </div>
                                                <div>
                                                    <label className="block text-[11px] font-bold text-gray-600 mb-1.5">祈願項目 / 超薦事由</label>
                                                    <input type="text" value={formData.wish} onChange={e => setFormData({...formData, wish: e.target.value})} className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all font-medium" />
                                                </div>
                                                <div>
                                                    <label className="block text-[11px] font-bold text-gray-600 mb-1.5">供養人 / 陽上人叩拜</label>
                                                    <input type="text" value={formData.offerer} onChange={e => setFormData({...formData, offerer: e.target.value})} className="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all font-medium" placeholder="如：信士某某某" />
                                                </div>
                                            </section>

                                            {/* 手機端底部按鈕，引導切換到預覽 */}
                                            <button onClick={() => setEditorTab('preview')} className="lg:hidden w-full py-3 mt-4 bg-slate-800 text-white rounded-xl font-bold text-sm shadow-md">
                                                填寫完畢，前往預覽結果
                                            </button>
                                        </div>
                                    </div>

                                    {/* --- 預覽區：右側面板 (高保真 SVG 渲染) --- */}
                                    <div className={`flex-1 bg-[#d1d5db] overflow-auto p-4 sm:p-10 flex justify-center items-start print:p-0 print:bg-white relative ${editorTab === 'preview' ? 'flex' : 'hidden lg:flex'}`}>
                                        
                                        {/* A4 畫布與自動縮放邏輯 */}
                                        <div 
                                            className="bg-white shadow-2xl relative print-area origin-top transition-transform duration-300 mx-auto" 
                                            style={{ 
                                                width: '210mm', height: '297mm', padding: '15mm', minWidth: '210mm',
                                                backgroundColor: activeTemplate?.bgColor,
                                                transform: window.innerWidth < 640 ? 'scale(0.45)' : 
                                                           window.innerWidth < 768 ? 'scale(0.65)' : 
                                                           window.innerWidth < 1024 ? 'scale(0.85)' : 'scale(1)'
                                            }}
                                        >
                                            {/* SVG 高保真傳統邊框 */}
                                            <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 210 297">
                                                {/* 外層細框 */}
                                                <rect x="5" y="5" width="200" height="287" fill="none" stroke={activeTemplate?.color} strokeWidth="0.5" />
                                                {/* 內層粗框 */}
                                                <rect x="8" y="8" width="194" height="281" fill="none" stroke={activeTemplate?.color} strokeWidth="1.5" />
                                                
                                                {/* 傳統角飾 (對齊內框角落) */}
                                                {[ [8,8], [202,8], [8,289], [202,289] ].map(([x,y], i) => (
                                                    <circle key={i} cx={x} cy={y} r="2.5" fill={activeTemplate?.color} />
                                                ))}

                                                {/* 右上角朱文印章：佛法僧寶 */}
                                                <g transform="translate(165, 35)" opacity="0.6">
                                                   <rect x="0" y="0" width="26" height="26" fill="none" stroke="#dc2626" strokeWidth="1.5" />
                                                   <text x="13" y="10.5" textAnchor="middle" fill="#dc2626" fontSize="5.5" fontWeight="900" style={{fontFamily: 'serif'}}>佛法</text>
                                                   <text x="13" y="19" textAnchor="middle" fill="#dc2626" fontSize="5.5" fontWeight="900" style={{fontFamily: 'serif'}}>僧寶</text>
                                                </g>
                                            </svg>

                                            {/* 疏文排版核心：直書系統 */}
                                            <div className="relative h-full w-full flex flex-row-reverse justify-between items-start text-black writing-v">
                                                
                                                {/* 區塊 1：文疏大標題 */}
                                                <div className="flex flex-col items-center mx-6 mt-6">
                                                    <h1 className="text-[2.5rem] font-black border-4 p-3 leading-none tracking-[0.5em] shadow-sm" style={{borderColor: activeTemplate?.color, color: activeTemplate?.color}}>
                                                        {activeTemplate?.name}
                                                    </h1>
                                                </div>

                                                {/* 區塊 2：主要內文 */}
                                                <div className="flex-1 flex flex-row-reverse items-start px-8 py-8 gap-12">
                                                    
                                                    {/* 段落A：起手式與基本資料 */}
                                                    <div className="flex flex-col gap-2">
                                                        <p className="text-2xl font-black mb-4 tracking-widest" style={{color: activeTemplate?.color}}>伏以</p>
                                                        <p className="text-base leading-10 tracking-widest font-bold">神威廣大，恩光普照。今有居住於：</p>
                                                        <p className="text-base leading-10 underline decoration-red-600 decoration-2 underline-offset-[10px] font-bold">
                                                            {formData.address || '　　　　　　　　　　'}
                                                        </p>
                                                        <p className="text-base leading-10 font-bold mt-4">
                                                           弟子 <span className="text-[2.75rem] font-black mx-4 border-b-4 border-red-600 pb-2">{formData.name || '姓名'}</span> 
                                                           ，生於 <span className="font-black text-lg underline decoration-red-600 decoration-2">{formData.lunarDate}</span> 年 <span className="font-black text-lg underline decoration-red-600 decoration-2">{formData.lunarMonth}</span> 月 <span className="font-black text-lg underline decoration-red-600 decoration-2">{formData.lunarDay}</span> 日，屬 <span className="font-black text-2xl">{formData.zodiac}</span>。
                                                        </p>
                                                    </div>

                                                    {/* 段落B：祈求內容 */}
                                                    <div className="flex flex-col gap-2 pt-24">
                                                        <p className="text-base leading-10 font-black border-b-2 border-black pb-1 mb-2">誠心祈求：{formData.wish}</p>
                                                        <p className="text-base leading-10 font-bold tracking-widest">祈願百災消除，千祥雲集。</p>
                                                        <p className="text-base leading-10 font-bold tracking-widest">合家平安，萬事如意。</p>
                                                    </div>

                                                    {/* 段落C：落款與日期 */}
                                                    <div className="flex flex-col gap-2 pt-40 items-end">
                                                        <p className="text-sm font-bold opacity-60 italic mb-10 tracking-widest">謹疏以聞</p>
                                                        <div className="flex flex-col items-center">
                                                            <p className="text-base font-bold">
                                                                <span className="text-sm">叩拜人：</span>
                                                                <span className="text-3xl font-black mx-3">{formData.offerer}</span> 
                                                                <span className="text-sm font-bold">百拜</span>
                                                            </p>
                                                            <p className="text-sm mt-12 text-gray-700 font-mono tracking-tighter font-bold border-t border-gray-400 pt-2">
                                                                天運歲次 {formData.lunarDate} {formData.lunarMonth} {formData.lunarDay} 立
                                                            </p>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* 區塊 3：左側邊界裝飾 (佛教/道教符號) */}
                                                <div className="w-16 border-l h-full flex flex-col items-center justify-between py-12 opacity-15 shrink-0" style={{borderColor: activeTemplate?.color}}>
                                                    <div className="text-5xl" style={{color: activeTemplate?.color}}>卍</div>
                                                    <div className="flex-1 border-l-2 border-dashed my-8" style={{borderColor: activeTemplate?.color}}></div>
                                                    <div className="text-5xl" style={{color: activeTemplate?.color}}>卍</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
